version: v1.0
application:
  type: language
  name: graph-rag-demo
  description: A GRAPH-RAG chat bot using local documents.
  containers:
    - name: llamacpp-server-model
      contextdir: ../../../model_servers/llamacpp_python
      containerfile: ./base/Containerfile
      model-service: true
      backend:
        - llama-cpp
      arch:
        - arm64
        - amd64
      ports:
        - 8000
      image: quay.io/ai-lab/llamacpp_python:latest
    - name: llamacpp-server-embed
      contextdir: ../../../model_servers/llamacpp_python
      containerfile: ./base/Containerfile
      model-service: true
      backend:
        - llama-cpp
      arch:
        - arm64
        - amd64
      ports:
        - 8001
      image: quay.io/ai-lab/llamacpp_python:latest
    - name: rag-inference-app
      contextdir: app
      containerfile: Containerfile
      arch:
        - arm64
        - amd64
      ports:
        - 8501
      image: quay.io/ai-lab/graph-rag:latest